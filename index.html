<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Promo Mailer - VPN Trinh Hg</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #0f172a; margin: 0; }
    
    /* Chuyển Toast xuống góc dưới để không che menu */
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
    .toast-item { padding: 0.75rem 1.25rem; border-radius: 0.75rem; font-weight: 700; font-size: 0.85rem; color: #fff; background: #1e293b; box-shadow: 0 10px 15px -3px rgba(0,0,0,.2); transform: translateY(120%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .toast-item.show { transform: translateY(0); }

    .color-swatch { display: none; }
    .color-swatch + label { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.15s; }
    .color-swatch:checked + label { border-color: #0f172a; transform: scale(1.2); }
    
    .toggle-wrap { position: relative; width: 40px; height: 22px; display: inline-block; }
    .toggle-wrap input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #cbd5e1; border-radius: 22px; transition: 0.3s; }
    .toggle-slider::before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
    input:checked + .toggle-slider { background: #4f46e5; }
    input:checked + .toggle-slider::before { transform: translateX(18px); }

    .phone-shell { background: #1e293b; border-radius: 2.5rem; padding: 10px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.3); width: 100%; max-width: 320px; height: 620px; margin: 0 auto; }
    .phone-screen { background: #f8fafc; border-radius: 1.75rem; overflow-x: hidden; overflow-y: auto; height: 100%; display: flex; flex-direction: column; }
    
    /* Ép Header mail dài luôn nằm 1 dòng hoặc bóp gọn nhất có thể */
    .mail-header-text { font-size: 1.1rem; text-transform: uppercase; font-weight: 900; line-height: 1.2; padding: 0 10px; margin: 0; color: white; word-wrap: break-word; }

    .tab-btn { padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; color: #64748b; transition: all 0.2s; white-space: nowrap; }
    .tab-btn.active { background: #4f46e5; color: white; box-shadow: 0 2px 8px rgba(79,70,229,0.3); }

    /* Scale mini preview cho Mẫu Lưu */
    .mini-preview-wrap { width: 100%; height: 180px; overflow: hidden; position: relative; background: #f8fafc; border-bottom: 1px solid #e2e8f0; border-radius: 1rem 1rem 0 0; }
    .mini-preview-scale { transform: scale(0.65); transform-origin: top center; width: 150%; margin-left: -25%; pointer-events: none; }
  </style>
</head>
<body class="pb-10">
  <div id="toastBox" class="toast"></div>

  <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-6xl mx-auto px-3 py-2 flex justify-between items-center overflow-x-auto gap-4">
      <h1 class="text-lg font-extrabold text-indigo-600 flex items-center shrink-0"><i class="fas fa-paper-plane mr-2 text-pink-500"></i>PromoMailer</h1>
      <div class="flex bg-slate-100 p-1 rounded-xl shrink-0">
        <button onclick="goTab('workspace')" id="btn-workspace" class="tab-btn active"><i class="fas fa-rocket mr-1.5"></i>Chiến Dịch</button>
        <button onclick="goTab('templates')" id="btn-templates" class="tab-btn"><i class="fas fa-folder-open mr-1.5"></i>Mẫu Lưu</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-3 mt-2">
    <div id="tab-workspace" class="grid grid-cols-1 lg:grid-cols-12 gap-5">
      
      <div class="lg:col-span-7 space-y-5">
        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
          <div class="flex justify-between items-center mb-3">
            <h2 class="font-black text-slate-800 text-sm uppercase"><i class="fas fa-pen-nib mr-1.5 text-indigo-500"></i>Nội Dung Mail</h2>
            <button onclick="saveTemplate()" class="bg-indigo-50 text-indigo-700 hover:bg-indigo-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition"><i class="fas fa-save mr-1"></i>Lưu Mẫu</button>
          </div>
          
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div><input type="text" id="mailSubj" placeholder="Tiêu đề Email..." class="w-full p-2.5 border border-slate-200 rounded-xl text-sm font-bold bg-slate-50 focus:border-indigo-500 outline-none" onkeyup="updatePreview()"></div>
            <div><input type="text" id="mailHead" placeholder="Chữ Header (Căn giữa)" class="w-full p-2.5 border border-slate-200 rounded-xl text-sm font-bold bg-slate-50 focus:border-indigo-500 outline-none" onkeyup="updatePreview()"></div>
          </div>

          <div class="mb-3 flex items-center gap-2">
            <span class="text-[10px] font-bold text-slate-400 uppercase">Màu:</span>
            <div class="flex gap-1.5 flex-wrap">
              <input type="radio" name="colorTheme" value="linear-gradient(135deg, #2563eb, #3b82f6)" id="cBlue" class="color-swatch" checked onchange="updatePreview()"><label for="cBlue" style="background:linear-gradient(135deg, #2563eb, #3b82f6)"></label>
              <input type="radio" name="colorTheme" value="linear-gradient(135deg, #16a34a, #22c55e)" id="cGreen" class="color-swatch" onchange="updatePreview()"><label for="cGreen" style="background:linear-gradient(135deg, #16a34a, #22c55e)"></label>
              <input type="radio" name="colorTheme" value="linear-gradient(135deg, #dc2626, #ef4444)" id="cRed" class="color-swatch" onchange="updatePreview()"><label for="cRed" style="background:linear-gradient(135deg, #dc2626, #ef4444)"></label>
              <input type="radio" name="colorTheme" value="linear-gradient(135deg, #ca8a04, #eab308)" id="cGold" class="color-swatch" onchange="updatePreview()"><label for="cGold" style="background:linear-gradient(135deg, #ca8a04, #eab308)"></label>
              <input type="radio" name="colorTheme" value="linear-gradient(135deg, #db2777, #f43f5e)" id="cPink" class="color-swatch" onchange="updatePreview()"><label for="cPink" style="background:linear-gradient(135deg, #db2777, #f43f5e)"></label>
              <input type="radio" name="colorTheme" value="linear-gradient(135deg, #0f172a, #1e293b)" id="cDark" class="color-swatch" onchange="updatePreview()"><label for="cDark" style="background:linear-gradient(135deg, #0f172a, #1e293b)"></label>
            </div>
          </div>
          
          <div class="border border-slate-200 rounded-xl overflow-hidden">
            <div class="bg-slate-50 border-b border-slate-200 p-1.5 flex flex-wrap gap-1 items-center">
              <button onclick="insText('[B]In_đậm[/B]')" class="px-2 py-1 bg-white border rounded text-xs font-bold hover:bg-slate-100">B</button>
              <button onclick="insText('[I]In_nghiêng[/I]')" class="px-2 py-1 bg-white border rounded text-xs italic hover:bg-slate-100">I</button>
              <div class="w-px h-4 bg-slate-300 mx-1"></div>
              <button onclick="insText('{Email}')" class="px-1.5 py-1 text-indigo-600 rounded text-xs font-bold hover:bg-indigo-100">{Email}</button>
              <button onclick="insText('{MaDon}')" class="px-1.5 py-1 text-indigo-600 rounded text-xs font-bold hover:bg-indigo-100">{MãĐơn}</button>
              <div class="w-px h-4 bg-slate-300 mx-1"></div>
              <button onclick="insText('\n[BTN]TÊN_NÚT|https://link_vao_day.com[/BTN]')" class="px-1.5 py-1 text-blue-600 rounded text-xs font-bold hover:bg-blue-100"><i class="fas fa-link mr-1"></i>Nút</button>
              <button onclick="insText('\n[IMG]https://link_anh_vao_day.jpg[/IMG]')" class="px-1.5 py-1 text-pink-600 rounded text-xs font-bold hover:bg-pink-100"><i class="fas fa-image mr-1"></i>Ảnh</button>
            </div>
            <textarea id="mailRaw" oninput="updatePreview()" rows="8" class="w-full p-3 focus:outline-none text-slate-800 text-sm leading-relaxed" style="font-family:'Plus Jakarta Sans', sans-serif;" placeholder="Soạn nội dung tại đây..."></textarea>
          </div>

          <div class="grid grid-cols-2 gap-3 mt-3">
            <div class="flex items-center justify-between p-2.5 bg-slate-50 border border-slate-200 rounded-xl">
              <span class="text-xs font-bold text-slate-700">Nút Cổng KH</span>
              <label class="toggle-wrap"><input type="checkbox" id="togPortal" checked onchange="updatePreview()"><span class="toggle-slider"></span></label>
            </div>
            <div class="flex items-center justify-between p-2.5 bg-slate-50 border border-slate-200 rounded-xl">
              <span class="text-xs font-bold text-slate-700">Chân Hỗ trợ</span>
              <label class="toggle-wrap"><input type="checkbox" id="togContact" checked onchange="updatePreview()"><span class="toggle-slider"></span></label>
            </div>
          </div>
        </div>

        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
          <div class="flex justify-between items-center mb-2">
            <h2 class="font-black text-slate-800 text-sm uppercase"><i class="fas fa-users mr-1.5 text-indigo-500"></i>Danh Sách Nhận</h2>
            <div class="text-xs font-bold bg-indigo-100 text-indigo-700 px-2 py-1 rounded-lg"><span id="countTargets">0</span> KHÁCH</div>
          </div>
          <div class="flex gap-3 h-32">
            <textarea id="rawTargets" class="flex-1 p-2 border border-slate-200 rounded-xl text-xs font-mono bg-slate-50 focus:border-indigo-500 outline-none resize-none" placeholder="Dán chuỗi email (a@gmail.com, b@...) HOẶC dán toàn bộ JSON đơn hàng để hệ thống tự lọc."></textarea>
            <div class="flex flex-col gap-2 w-28 shrink-0">
              <button onclick="parseTargets()" class="flex-1 bg-green-500 text-white font-bold rounded-xl text-xs hover:bg-green-600 transition shadow-sm"><i class="fas fa-plus block mb-1"></i>Thêm Khách</button>
              <button onclick="clearTargets()" class="h-8 bg-red-50 text-red-500 font-bold rounded-xl text-xs hover:bg-red-500 hover:text-white transition"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        </div>
      </div>

      <div class="lg:col-span-5 flex flex-col gap-5">
        <div class="sticky top-16">
          <div class="phone-shell relative">
            <div class="phone-screen">
              <div class="bg-white p-3 border-b border-slate-100 shadow-sm shrink-0">
                <div class="text-[11px] font-black text-slate-800 truncate" id="previewSubj">Tiêu đề email...</div>
                <div class="text-[9px] text-slate-400 mt-0.5">Từ: VPN Trinh Hg</div>
              </div>
              <div class="p-3 flex-1" id="previewPane"></div>
            </div>
          </div>
          <button id="btnSendAll" onclick="executeSend()" class="mt-4 w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-black py-4 rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all text-base"><i class="fas fa-paper-plane mr-2"></i>BẮN MAIL HÀNG LOẠT</button>
        </div>
      </div>

    </div>

    <div id="tab-templates" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-black text-slate-800 uppercase">Quản lý Mẫu Email</h2>
        <button onclick="loadTemplatesFromCloud()" class="bg-white border border-slate-200 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-50 shadow-sm"><i class="fas fa-sync-alt mr-1"></i>Làm mới</button>
      </div>
      <div id="gridTemplates" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5"></div>
    </div>
  </main>

  <script>
    // ==========================================
    // 1. CẤU HÌNH API
    // ==========================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJB8uFSf7FSTIatfvQuZANemM91uTTqvSQNYw7EFNBJSukBsrXap-H6Ul1rQcExXt_/exec"; // THAY BẰNG LINK GAS MỚI
    const PORTAL_URL = "https://vpntrinhhg.pages.dev";
    const RAW_TPL_URL = "https://raw.githubusercontent.com/trinhhg/quanlymail/main/templates.json"; 
    const RAW_TGT_URL = "https://raw.githubusercontent.com/trinhhg/quanlymail/main/targets.json"; 
    
    let templatesDb = [];
    let parsedTargets = [];

    window.onload = () => {
      loadDataFromCloud();
      updatePreview();
    };

    // ==========================================
    // 2. GIAO TIẾP GITHUB & DATA
    // ==========================================
    async function loadDataFromCloud() {
      // Tải mẫu
      try {
        const res1 = await fetch(`${RAW_TPL_URL}?t=${Date.now()}`);
        if (res1.ok) { templatesDb = await res1.json(); renderTemplates(); }
      } catch (e) { console.log("Lỗi tải mẫu"); }

      // Tải danh sách khách
      try {
        const res2 = await fetch(`${RAW_TGT_URL}?t=${Date.now()}`);
        if (res2.ok) { parsedTargets = await res2.json(); updateTargetCount(); }
      } catch (e) { console.log("Lỗi tải khách"); }
    }

    async function saveTargetsToCloud() {
      toast("Đang đồng bộ Danh sách Khách lên hệ thống...");
      updateTargetCount();
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: "commitData", path: "targets.json", content: JSON.stringify(parsedTargets), message: "Sync Targets" })
      });
      toast("Đồng bộ Khách hoàn tất!");
    }

    // ==========================================
    // 3. UI & XỬ LÝ HTML (FIXED REGEX & LAYOUT)
    // ==========================================
    function toast(msg, type="ok") {
      const box = document.getElementById("toastBox"); const el = document.createElement("div");
      el.className = `toast-item ${type === 'err' ? 'border-red-500' : 'border-green-500'}`;
      el.innerHTML = `<span>${msg}</span>`;
      box.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add("show")));
      setTimeout(() => { el.classList.remove("show"); setTimeout(() => el.remove(), 250); }, 3000);
    }

    function goTab(tab) {
      ['workspace', 'templates'].forEach(t => {
        document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
        document.getElementById(`btn-${t}`).classList.toggle('active', t === tab);
      });
      if(tab === 'templates') renderTemplates();
    }

    function insText(t) {
      const ta = document.getElementById("mailRaw"); const s = ta.selectionStart;
      ta.value = ta.value.slice(0,s) + t + ta.value.slice(ta.selectionEnd);
      ta.focus(); updatePreview();
    }

    function parseContent(raw, email="khach@email.com", maDon="DH-XXXXXXXX", nickname="Bạn") {
      let html = raw.replace(/\[B\](.*?)\[\/B\]/gs, "<b>$1</b>")
                    .replace(/\[I\](.*?)\[\/I\]/gs, "<i>$1</i>")
                    .replace(/\{Email\}/g, `<b style="color:#0f172a;">${email}</b>`)
                    .replace(/\{MaDon\}/g, `<b style="color:#4f46e5;">${maDon}</b>`)
                    .replace(/\{Tên\}/g, `<b>${nickname}</b>`); // Đổi thành {Tên} cho gọn
      
      // Xử lý thẻ IMG đóng mở
      html = html.replace(/\[IMG\](.*?)\[\/IMG\]/gi, '<img src="$1" style="max-width:100%;height:auto;border-radius:8px;margin:15px auto;display:block;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);" />');
      
      // Xử lý thẻ BTN đóng mở [BTN]Tên Nút|Link[/BTN]
      html = html.replace(/\[BTN\](.*?)\|(.*?)\[\/BTN\]/gi, '<div style="text-align:center;margin:20px 0;"><a href="$2" target="_blank" style="display:inline-block;background:linear-gradient(135deg,#4f46e5,#6366f1);color:white;padding:12px 24px;border-radius:8px;font-weight:900;text-decoration:none;font-size:14px;box-shadow:0 4px 10px rgba(79,70,229,0.3)">$1</a></div>');

      let out = "";
      html.split('\n').forEach(line => {
        let trimLine = line.trim();
        if(!trimLine) return;
        if(trimLine === "[LINE]") { out += `<hr style="border:none;border-top:1px solid #e2e8f0;margin:16px 0;" />`; return; }
        if(trimLine.includes("<img") || trimLine.includes("<div style=\"text-align:center;margin:20px 0;\"><a")) {
          out += trimLine; // Bỏ qua wrap <p> cho nút và ảnh
        } else {
          out += `<p style="margin:0 0 10px 0;color:#334155;font-size:14px;line-height:1.6;">${trimLine}</p>`;
        }
      });
      return out;
    }

    function buildFinalHtml(subject, headerStr, colorHex, rawBody, useContact, usePortal, userEmail, userOrder, userNick) {
      let bodyHtml = parseContent(rawBody, userEmail, userOrder, userNick);
      
      let portalBlock = usePortal ? `
        <div style="text-align:center;margin:24px 0;">
          <a href="${PORTAL_URL}" style="background:#1e293b;color:white;padding:14px 20px;border-radius:10px;text-decoration:none;font-weight:900;display:inline-block;width:100%;box-sizing:border-box;font-size:14px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);">TRUY CẬP CỔNG KHÁCH HÀNG</a>
          <p style="font-size:12px;color:#64748b;margin-top:12px;line-height:1.5;">👉 Dùng <b>Mã Đơn Hàng</b> hoặc <b>Email</b> để tra cứu và lấy link VPN.</p>
        </div>` : "";

      let contactBlock = useContact ? `
        <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-top:10px;text-align:center;">
          <p style="margin:0 0 12px 0;color:#475569;font-size:13px;font-weight:bold;">Cần hỗ trợ? Đội ngũ của chúng tôi sẵn sàng 24/24</p>
          <div style="display:block;width:100%;">
            <a href="https://zalo.me/0917678211" style="display:inline-block;width:46%;background:#0068ff;color:white;padding:10px 0;text-decoration:none;border-radius:8px;font-weight:bold;font-size:12px;box-sizing:border-box;">Chat Zalo</a>
            <a href="https://www.facebook.com/trinh.hg.57" style="display:inline-block;width:46%;background:#0668E1;color:white;padding:10px 0;text-decoration:none;border-radius:8px;font-weight:bold;font-size:12px;margin-left:4%;box-sizing:border-box;">Messenger</a>
          </div>
        </div>` : "";

      return `
        <div style="font-family:sans-serif;width:100%;max-width:500px;margin:auto;background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;box-sizing:border-box;">
          <div style="background:${colorHex};padding:20px 10px;text-align:center;">
            <p class="mail-header-text">${headerStr}</p>
          </div>
          <div style="padding:24px 20px;box-sizing:border-box;">
            ${bodyHtml}
            ${portalBlock}
            ${contactBlock}
          </div>
        </div>`;
    }

    function updatePreview() {
      const subj = document.getElementById("mailSubj").value || "Tiêu đề...";
      const head = document.getElementById("mailHead").value || "THÔNG BÁO";
      const color = document.querySelector('input[name="colorTheme"]:checked').value;
      const raw = document.getElementById("mailRaw").value;
      const useContact = document.getElementById("togContact").checked;
      const usePortal = document.getElementById("togPortal").checked;

      document.getElementById("previewSubj").textContent = subj;
      document.getElementById("previewPane").innerHTML = buildFinalHtml(subj, head, color, raw, useContact, usePortal);
    }

    // ==========================================
    // 4. MẪU LƯU
    // ==========================================
    async function saveTemplate() {
      const tpl = {
        id: Date.now(),
        subj: document.getElementById("mailSubj").value,
        head: document.getElementById("mailHead").value,
        color: document.querySelector('input[name="colorTheme"]:checked').value,
        raw: document.getElementById("mailRaw").value,
        useContact: document.getElementById("togContact").checked,
        usePortal: document.getElementById("togPortal").checked
      };
      if(!tpl.subj || !tpl.raw) return toast("Nhập đủ Tiêu đề và Nội dung!", "err");
      
      templatesDb.unshift(tpl);
      toast("Đang lưu Mẫu lên hệ thống...");
      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: "commitData", path: "templates.json", content: JSON.stringify(templatesDb, null, 2), message: "Save Template" })
      }).then(() => { toast("Lưu thành công!"); renderTemplates(); });
    }

    function renderTemplates() {
      const grid = document.getElementById("gridTemplates");
      if(!templatesDb.length) { grid.innerHTML = `<p class="col-span-full text-center py-10 text-slate-400 font-bold">Chưa có mẫu nào.</p>`; return; }
      
      grid.innerHTML = templatesDb.map((t, i) => {
        // Render Mini HTML preview
        let miniHtml = buildFinalHtml(t.subj, t.head, t.color, t.raw, t.useContact, t.usePortal);
        return `
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm flex flex-col hover:border-indigo-400 transition overflow-hidden">
          <div class="mini-preview-wrap"><div class="mini-preview-scale pointer-events-none">${miniHtml}</div></div>
          <div class="p-3">
            <h3 class="font-bold text-slate-800 text-sm truncate mb-2">${t.subj}</h3>
            <div class="flex gap-2">
              <button onclick="useTemplate(${i})" class="flex-1 bg-indigo-50 text-indigo-700 hover:bg-indigo-600 hover:text-white text-xs font-bold py-2 rounded-lg transition">Sử dụng</button>
              <button onclick="delTemplate(${i})" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white px-3 rounded-lg transition"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        </div>
      `}).join('');
    }

    function useTemplate(i) {
      const t = templatesDb[i];
      document.getElementById("mailSubj").value = t.subj;
      document.getElementById("mailHead").value = t.head;
      document.getElementById("mailRaw").value = t.raw;
      document.getElementById("togContact").checked = t.useContact;
      document.getElementById("togPortal").checked = t.usePortal;
      document.querySelectorAll('input[name="colorTheme"]').forEach(r => { if(r.value === t.color) r.checked = true; });
      updatePreview(); goTab('workspace'); toast("Đã nạp mẫu!");
    }

    function delTemplate(i) {
      templatesDb.splice(i, 1); renderTemplates(); toast("Đang xóa...");
      fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "commitData", path: "templates.json", content: JSON.stringify(templatesDb, null, 2), message: "Delete Template" }) });
    }

    // ==========================================
    // 5. NẠP KHÁCH HÀNG & GỬI
    // ==========================================
    function parseDate(dateStr) {
      if(!dateStr) return null; const p = dateStr.split('/');
      if(p.length !== 3) return null; return new Date(p[2], p[1]-1, p[0]);
    }

    function updateTargetCount() {
      document.getElementById("countTargets").textContent = parsedTargets.length;
    }

    async function parseTargets() {
      const raw = document.getElementById("rawTargets").value.trim();
      if(!raw) return toast("Ô dữ liệu trống!", "err");
      
      const today = new Date(); today.setHours(0,0,0,0);
      let countAdded = 0;
      const isExist = (email) => parsedTargets.some(t => t.email === email);

      try {
        const arr = JSON.parse(raw);
        if(Array.isArray(arr)) {
          arr.forEach(o => {
            if(o.status === "success" && o.email) {
              const exp = parseDate(o.expDate);
              const cleanEmail = o.email.trim();
              if(exp && exp >= today && !isExist(cleanEmail)) {
                parsedTargets.push({ email: cleanEmail, id: o.id || "N/A", nickname: o.nickname || "Bạn" });
                countAdded++;
              }
            }
          });
        }
      } catch (e) {
        const emails = raw.split(/[\n,]+/).map(e => e.trim()).filter(e => e.includes('@'));
        emails.forEach(e => {
          if(!isExist(e)) { parsedTargets.push({ email: e, id: "Khách lẻ", nickname: "Bạn" }); countAdded++; }
        });
      }
      
      if(countAdded > 0) {
        document.getElementById("rawTargets").value = "";
        saveTargetsToCloud(); // Gọi hàm đồng bộ lên Github
      } else {
        toast("Không tìm thấy khách mới hợp lệ!", "warn");
      }
    }

    async function clearTargets() {
      if(confirm("Xóa sạch danh sách chờ gửi?")) {
        parsedTargets = [];
        saveTargetsToCloud();
      }
    }

    async function executeSend() {
      if(!parsedTargets.length) return toast("Chưa có khách hàng nào!", "err");
      
      const subj = document.getElementById("mailSubj").value;
      const head = document.getElementById("mailHead").value;
      const color = document.querySelector('input[name="colorTheme"]:checked').value;
      const raw = document.getElementById("mailRaw").value;
      const useContact = document.getElementById("togContact").checked;
      const usePortal = document.getElementById("togPortal").checked;

      if(!subj || !raw) return toast("Chưa soạn xong nội dung mail!", "err");
      
      const btn = document.getElementById("btnSendAll");
      btn.disabled = true;
      let successCount = 0;
      let total = parsedTargets.length;

      for (let i = 0; i < total; i++) {
        const target = parsedTargets[i];
        btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i>Đang gửi (${i+1}/${total})...`;
        
        const htmlBody = buildFinalHtml(subj, head, color, raw, useContact, usePortal, target.email, target.id, target.nickname);
        
        try {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "sendMail", to: target.email, subject: subj, html: htmlBody })
          });
          successCount++;
          await new Promise(r => setTimeout(r, 400));
        } catch (err) { console.error("Lỗi gửi:", target.email); }
      }

      toast(`Hoàn tất! Đã gửi ${successCount}/${total} email.`);
      btn.innerHTML = `<i class="fas fa-paper-plane mr-2"></i>BẮN MAIL HÀNG LOẠT`;
      btn.disabled = false;
    }
  </script>
</body>
